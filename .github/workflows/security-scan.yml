name: Security Scan

on:
  pull_request:
    #types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run scanner_updated.py
        id: run_scan
        run: |
          echo "Running Security Scanner..."
          output=$(python scripts/scanner_updated.py)
          echo "$output" > security-scan-results.txt

          if echo "$output" | grep -q "Severity: HIGH"; then
            echo "scan_status=Critical Issues Found!" >> $GITHUB_ENV
          else
            echo "scan_status=No Critical Issues Detected" >> $GITHUB_ENV
          fi

          echo "scanner_output<<EOF" >> $GITHUB_ENV
          echo "$output" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v3.1.3
        with:
          name: security-scan-results
          path: |
            security-scan-results.txt
          retention-days: 5

      - name: Fail if vulnerabilities found
        if: env.scan_status == 'Critical Issues Found!'
        run: |
          echo "::error::Critical security vulnerabilities were detected. Please review and address them before merging or pushing."
          exit 1
